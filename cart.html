<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crude Labz Cart</title>
    <link rel="stylesheet" href="./css/style.css" />
    <link rel="icon" href="./favicon.ico" />
</head>
<body>
    <header>
        <div class="container header-inner">
            <div class="brand">
                <img class="logo" src="./images/logo.png" alt="Crude Labz logo" />
                <div>
                    <span>Crude Labz</span>
                    <small>Marine veteran owned research peptides</small>
                </div>
            </div>
            <nav class="site-nav">
                <a href="index.html">Home</a>
                <a href="products.html">Products</a>
                <a href="cart.html">Cart</a>
                <a href="index.html#contact">Contact</a>
            </nav>
        </div>
    </header>
    <main class="container section-block">
        <div class="section-title">
            <div>
                <p class="eyebrow">Cart</p>
                <h2>Your order summary</h2>
            </div>
        </div>
        <div class="cart-panel">
            <h3>Your cart</h3>
            <p class="empty-cart">Your cart is empty. Add items from products.</p>
        </div>
    </main>
    <footer id="contact">
        <div class="container footer-grid">
            <div class="footer-card"
            </div>
        </div>
    </footer>
    <script src="./js/script.js"></script>
</body>
</html>
